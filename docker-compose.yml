version: "3.8"

services:
  homedash:
    build: .
    container_name: homedash
    restart: unless-stopped
    ports:
      - "9876:9876"
    volumes:
      - homedash-data:/app/data
    environment:
      - HOMEDASH_PORT=9876
      - HOMEDASH_USER=admin
      - HOMEDASH_PASS=admin
    networks:
      - homedash-net

volumes:
  homedash-data:

networks:
  homedash-net:
    driver: bridge
