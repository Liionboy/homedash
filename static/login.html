<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Homedash — Login</title>
<link rel="icon" href="/static/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e2e8f0}
.login-box{background:#11182b;border:1px solid #24304d;border-radius:20px;padding:40px;width:min(380px,90%);text-align:center}
.logo{font-size:48px;margin-bottom:8px}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
.subtitle{color:#64748b;font-size:13px;margin-bottom:28px}
.form{display:grid;gap:14px;text-align:left}
label{display:grid;gap:5px;font-size:12px;color:#94a3b8;text-transform:uppercase;font-weight:600}
input{background:#0f1527;border:1px solid #2a3654;border-radius:12px;padding:12px 14px;color:#eef2ff;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#3b82f6}
button{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:0;border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.9}
.error{color:#fca5a5;font-size:13px;min-height:20px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🏠</div>
  <h1>Homedash</h1>
  <p class="subtitle">Your self-hosted dashboard</p>
  <form class="form" id="login-form">
    <label>Username<input id="username" required autofocus /></label>
    <label>Password<input id="password" type="password" required /></label>
    <div class="error" id="error"></div>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const res = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('username').value, password:document.getElementById('password').value})});
  if (!res.ok) { document.getElementById('error').textContent = 'Invalid credentials'; return; }
  const data = await res.json();
  localStorage.setItem('homedash_token', data.token);
  location.href = '/';
});
if (localStorage.getItem('homedash_token')) location.href = '/';
</script>
</body>
</html>
